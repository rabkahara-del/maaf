<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>untuk kamu vici</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:linear-gradient(#0b0b0b,#151515);
  color:#e6e6e6;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.container{
  width:90%;
  max-width:700px;
  background:rgba(20,20,20,0.85);
  border-radius:18px;
  padding:20px;
  box-shadow:0 0 30px rgba(0,0,0,.6);
  max-height:80vh;
  overflow-y:auto;
}
h1{text-align:center;margin-bottom:20px;font-weight:500;}
p{line-height:1.7;margin-bottom:15px;font-size:15px;}
.btn{
  display:block;
  margin:15px auto 0;
  padding:10px 24px;
  border-radius:30px;
  border:1px solid #aaa;
  background:none;
  color:#eee;
  cursor:pointer;
  transition:.3s;
}
.btn:hover{background:#eee;color:#111;}
textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  resize:none;
}
.signature{
  margin-top:20px;
  text-align:right;
  font-style:italic;
  opacity:.8;
}
</style>
</head>

<body>

<audio id="bgm" loop></audio>
<div class="container" id="content"></div>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){
  emailjs.init("XHia2CkgRsrbmZhkn");
})();

const content = document.getElementById("content");
const bgm = document.getElementById("bgm");
let currentTrack = "";

/* ===== AUDIO CONTROL ===== */

function playMusic(src){
  if(currentTrack !== src){
    bgm.pause();
    bgm.src = src;
    bgm.load();

    // volume beda tiap lagu
    if(src === "lagu1.mp3"){
      bgm.volume = 0.9; // lagu pertama lebih keras
    } else {
      bgm.volume = 0.6; // lagu kedua normal
    }

    bgm.play().catch(()=>{});
    currentTrack = src;
  }
}

function stopMusic(){
  bgm.pause();
  bgm.currentTime = 0;
  currentTrack = "";
}

/* ===== KIRIM PESAN ===== */

function kirimPesan(){
  const pesan = document.getElementById("pesanInput").value;
  const hasil = document.getElementById("hasilPesan");
  const btn = document.getElementById("kirimBtn");

  if(pesan.trim()===""){
    hasil.innerHTML="jangan kosong ya.";
    return;
  }

  btn.innerHTML="mengirim...";
  btn.disabled=true;

  emailjs.send("service_88xkoyw","template_i8nr33c",{ message: pesan })
  .then(()=>{
    hasil.innerHTML="pesan berhasil dikirim.";
    btn.innerHTML="terkirim";
  },()=>{
    hasil.innerHTML="gagal mengirim.";
    btn.innerHTML="kirim";
    btn.disabled=false;
  });
}

/* ===== RENDER PAGE ===== */

function render(page){

  if(page==="home"){
    stopMusic();
    content.innerHTML=`
      <h1>hai.</h1>
      <p>aku buat ini untuk menyampaikan sesuatu yang belum sempat aku ucapkan dengan benar.</p>
      <button class="btn" onclick="goStepOne()">klik disini</button>
    `;
  }

  if(page==="step1"){
    playMusic("lagu1.mp3");
    content.innerHTML=`
      <h1>aku minta maaf.</h1>
      <p>hai.. gimana kabarnya?, semoga kamu selalu sehat ya.. maaf kalo tiba-tiba aku datang lagi.. maaf jika aku mengganggu, aku hanya ingin meminta waktumu sebentar untuk membaca pesan maaf ku ini, aku harap dengan pesan ini maaf ku dapat tersampaikan kepadamu ya. karena di contact terakhir kita, aku belum sempet meminta maaf dengan benar kepadamu.</p>
      <p>mungkin sebelum baca pesan ini kamu pasti menerima email dari aku, maafkan aku jika tidak sopan dan secara sembarangan mengirim email pribadi kepadamu, karena aku bener-bener ga punya akses lain lagi selain ke email kamu. after you blocked me on all my sosmed, aku hanya kepikiran aku pernah email kamu dulu dan akhirnya aku tergerak untuk menulis pesan ini, dikarenakan rasa bersalah yg selalu berputar dikepalaku setiap harinya.</p>
      <p>pertama, aku benar-benar minta maaf ya.. maaf dari lubuk hatiku yg paling dalam, maaf apabila aku bener-bener sangat menghancurkanmu. bukan cuma soal kebohongan yang dulu pernah aku lakukan, tapi juga soal caraku menyampaikan semuanya di akhir. mungkin bahasa ku saat itu terkesan kasar, kaku, kurang enak untuk dibaca dan sangat membekas dihatimu.. i feel so bad for this. tapi tidak bisa dipungkiri kalau memang begitu kejadiannya.</p>
      <p>aku tahu, kenyataan yang aku ungkap mungkin terasa seperti pukulan kedua untukmu setelah luka yang lama. dan aku paham kalau itu membuatmu marah, kecewa, bahkan merasa tidak dihargai.</p>
      <p>alasan mendasar kenapa aku berani jujur, pasti kamu bingung kan? karena sejauh sebelum kejadian ungkapan "jujurku" ke kamu. kenapa aku jujur? kenapa aku ungkapin masalah itu ke kamu? padahal hubungan kita baik-baik aja terlepas kita juga udh gada hubungan, but ini lebih ke konteks hubungan sbg manusia. kita mulai menerima 1 sama lain even tanpa status dan kita bisa berhubungan baik, dengan harapan mungkin bisa satu kembali. jadi kenapa aku seolah memperkeruh hubungan ini seakan aku ingin pergi beneran, seakan aku udah bener-bener ga nganggep kamu.. itu mungkin yg jadi pertanyaan km ke aku.</p>
      <p>jujurly aku tidak ingin kamu terus berharap pada seseorang yang bahkan belum jelas arah hidupnya. ini bukan hanya alasan belaka, tp ini benar-benar pure kenyataan yg aku alami sekarang, sorry to say tp ji dipikir secara logika apakah pantas seorang sepertiku orang yg masi bingung sendiri dengan jalan hidupnya dan seseorang yg bisa dibilang banyak gagal nya ini diharapkan sosok yg sempurna sepertimu, sosok yg berpendidikan, sosok yg seharusnya bisa mendapatkan lebih dari aku. bukannya aku menyerah.. tapi seiring waktu berlajan banyak momen yg hilang dihidupku tanpa bisa dikatakann itu berhasil, aku tau ini bagian dari proses tapi aku sadar diri aku gagal memenuhi janji” yg kita buat dulu... km mungkin juga tau kurang lebihnya hidupku seperti apa krn kita masih sering berkabar kala itu.</p>
      <p>huftt.. berat rasanya hampir 3 thn setelah lulus aku ngerasa gada improve nya samsek, gagal.. kek udah makanan setiap tahun kurasa.. sedih? iya bgt.. ketika tmn" udh mulai menemukan jalan mereka, sedangkan aku masih meraba-raba jalan mana yg harus aku pilih. aku ngerasa burnouts atas kehidupan ku sendiri.. lelah fisik, mental, psikis bener-bener sampai dititik yg aku gatau harus kemana, bahkan rumah yg aku anggap rumah sering kali tidak terasa menghangatkan. dan ketika aku merenungi itu semua, tiba-tiba terlintas dikepalaku kalo mungkin sebagian rasa beban hidup ini disebabkan atas kesalahan ku ke kamu. karena aku banyak berbohong selama kita berbuhungan dan aku menyembunyikan itu dari kamu, mungkin kesalahan yg aku perbuat itu menjadi problem atau alasan mengapa aku mendapat adanya tekanan hidup, rasa bersalah yg tak berujung ini. hingga akhirnya aku merasa aku harus jujur ke kamu atas semua yg aku sembunyikam, pikirku mungkin itu bisa sedikit meringankan jalan hidupku, dengan aku jujur ke kamu. dengan segala jenis konsekuensinya aku memberanikan diri untuk mengatakan itu ke kamu, setidaknya aku bisa lega dengan kejujuranku.</p>
      <p>satu lagi sikapmu yg selaluuu baikk sangat-sangat baik even the way you used to calm me down when everything felt too heavy, you were always the first to do that. ini menjadi alasan aku tidak bisa menerima baikmu lagi atas perilaku ku. aku merasa aku sudah membohongimu dan kamu tidak seharusnya baik ke aku. akan sangat bodoh apabila aku masih menerima perilaku baikmu itu, hingga pada akhirnya aku menulis semua yg aku tulis ke kamu waktu itu, dengan perasaan yg sedih. berat sangat-sangat berat.. hingga aku secara tidak sadar menulisnya dengan penuh rasa emosional dan tanpa mengolah kata-kataku terlebih dahulu, aku tidak menyalahkan mu hanya saja aku kecewa terhadap diriku sendiri krn aku tidak bisa dengan baik menjagamu. dari semua itu aku minta maaf ya.</p>
      <p>intinya aku merasa hidupku belum stabil, belum punya pencapaian yang bisa dibanggakan, dan aku takut kamu menggantungkan harapan pada laki-laki yang masih berantakan ini, ditambah dengan all my lies to you, maaf ya. pikirku waktu itu aku hanya butuh ruang sejenak untuk memperbaiki diriku ini dan mencoba survive dengan masalahku ini, tp caraku menyampaikannya kepadamu terlalu berlebihan hingga aku ga sadar kalo apa yg aku ketik malahan membuat km lebih sakit, maaf ya kalo apa yg aku sampaikan dulu menyakitkan. dari kecil aku memang kurang adanya emotional control seorang laki", kurangnya peran ayah yg hadir dihidupku, mungkin menjadi alasan kenapa aku gampang meluapkan amarahku tanpa harus berpikir matang akan dampaknya. dan apa yang km katakan kalo aku “not gantle man”, it’s true, kamu gasalah kok kalo ngomong gitu.. aku bisa dibilang lemah, pecundang, not gantle man, nolep, bahkan temenku bisa dihitung jari. dan selama kita menjalin hubungan aku merasa gada impact positif apapun ke kamu aku hanya bisa membuat km kecewa dan sedih terus menerus. maka dari itu you derseve better :( aku ga sanggup liat km terus-terus an berharap kepada pria bermalah ini.. aku ingin kamu lebih lepas dalam menikmati hidupmu, lebih mengerti orang-orang disekitar mu, tanpa harus terkekang oleh ku. aku tidak mau membawamu ke masalah ku lebih dalam lagi ci.. cukup aku aja ya yg merasakan ini, cukup dengan kebohonganku saja aku menyakitimu tidak lebih.</p>
      <p>aku juga ingin mengakui sesuatu yang baru aku pahami belakangan ini. sebagian dari perasaanku setelah semuanya selesai bukan hanya tentang kehilangan kamu, tapi tentang kehilangan rasa diterima. itulah pengalaman yg mungkin membuatku sedih dan sangat kecewa kepada diriku sendiri. disaat kamu adalah orang yang menerima aku apa adanya, bahkan disaat aku merasa biasa saja secara fisik dan belum jadi siapa-siapa. kamu selalu excited, selalu menerima, selalu mendukung, selalu membuat aku berfikir bahwa mimpiku itu bukan hanya sekedar angan-angan, yg secara tidak langsung kamu percaya kalau aku akan berhasil. memang.. tidak bisa dipungkiri kalo kamu selalu buat aku tenang dan sebenernya aku membutuhkan itu, tp dengan semua kesalahanku ke kamu.. ditambah dengan bagaimana reaksi km setelah aku jujur ke kamu, aku rasa aku gapantes dapetin itu lagi, biarlah aku hancur sendiri tanpa membawamu.</P>
      <p>vici.. mungkin kamu adalah pengalaman pertamaku yg memiliki ruang ter-sendiri di hatiku yg paling dalam, kamu akan menjadi pengalaman pertama yg ABADI persis seperti makna lagu "abadi" juga. bahwa aku mungkin memiliki masalalu yg cukup baik setelah bertemu dengan kamu, aku merasa dihargai, dicintai, diapresiasi, diperhatikan, yg sebelumnya belum pernah aku dapatkan. masalalu dengan mu terlihat sangat indah dan menenangkan yg hanya bisa aku kenang sekarang, tetapi sebagai manusia kita tidak bisa hidup hanya di masalalu.. krn hidup akan terus berjalan. tentang mengikhlaskan, mengikhlaskan masalalu yg akan selalu abadi, kita ga akan bisa selalu tinggal dimasa lalu, karena masalalu adalah pelajaran yg bikin kita seperti saat ini, detik ini, dan masa depan.</p>
      <button class="btn" onclick="goStepTwo()">lanjut</button>
      <button class="btn" onclick="history.back()">kembali</button>
    `;
  }

  if(page==="step2"){
    playMusic("lagu2.mp3");
    content.innerHTML=`
      <h1>also, here's a message from sender.</h1>
      <p>jujur last chat dr kamu bener-bener membuat aku sadar atas kesalahan jalan pikir ku. for me chat dari kamu itu berasa seperti menamparku, dan sangat membekas dibenakku.. but, its okey ini akan menjadi pelajaran untuk ku, aku sangat-sangat tersadarkan akan hal itu.. makasi ya. sekarang aku bisa merasa lega, kamu bener-bener tau akan kebohoganku terlepas akhirnya kamu membenciku, ini adalah fakta bahwa aku ga sebaik itu dan aku "ga pantes untuk diberi ketulusanmu" mungkin ini bisa jd pelajaran untuk kamu juga kedepannya berhati-hati dalam berhubungan ya. aku akan instrospeksi diriku ini, semoga aku bisa jadi lebih baik suatu hari nanti.</p>
      <p>aku tidak menyesal mengenalmu, mencintaimu, bahagia dan sedih bersamamu, bahkan aku tidak bisa membencimu. entah membekas atau tidak bagimu, namun bagiku hidup yg sempat ditemani kamu adalah salah satu part yang paalinggg aku syukuri dalam hidup. aku senang dari banyaknya manusia didunia, semesta dengan baik mempertemukan aku dan kamu. mungkin butuh waktu untuk aku move on darimu, aku gatau ini cuma kangen atau hati aku yg belum selesai. tapi belakangan ini kamu sering banget muncul dipikiran aku. hal-hal kecil tetang kamu tiba-tiba keinget, dan itu cukup buat bikin hati aku sepi lagi. aku bilang ke diri sendiri kalau i’m okey, tapi ternyata ngga sepenuhnya. ada bagian kecil dihati aku yg masih nyebut nama kamu pelan-pelan. aku ngga minta kamu balik kok. aku cuma.. KANGEN KANGEN BGTT. aku ngerasa egois masih kangen kamu sampai sekarang. padahal aku ngga punya hak lagi buat ngerasain itu. i try to act like i’m fine, seolah semuanya usai. tapi ada malam-malam dimana aku masih kepikiran kamu.. dan rasanya berat banget. bukan cuma karena kamu ngga ada disini, tapi karena aku sadar.. aku juga bagian dari alasan kenapa kamu pergi.</p>
      <p>aku tidak menulis ini untuk meminta kesempatan kedua atau pembelaan atas kesalahanku. aku hanya tidak ingin pergi dari hidupmu tanpa benar-benar meminta maaf dengan sepenuh hati. mungkin ini waktu yg tepat, aku gatau kamu sering buka email atau tidak, honestly ini sudah kali ke-5 mungkin atau lebih, aku mengupdate tulisan ku ini semenjak tulisan pertama yg bahkan aku kirim sebelum bulan puasa sampai sekarang. km masi belum buka pesan ini ya? sampai udah lebaran... sekalian aja aku minta maaf lahir dan batinku ya, aku banyak salah sama kamu dan aku bener-bener ingin minta maaf, maaf yg sebesar besarnya. maafin aku ya vici maaf bangettt aku gabisa jadi laki-laki yg km harapkan. Eid Mubarak Annisa Vici Karisma, selamat menikmati opor dan semoga keberkahan ramadhan menyertaimu. aku doakan untuk segala sesuatu yg sekarang dan nanti kamu hadapi dan usahakan, aku berdoa semoga Allah melancarkan segalanya untukmu AAMIIN.</p>
      <p>“melepaskanmu adalah caraku mencintaimu yang paling jujur. aku berhenti memaksamu tinggal, bukan karena rasaku hilang, tapi karena aku sadar bahagiamu ternyata nggak lagi di sampingku. aku memulangkanmu pada dirimu sendiri, pada mimpi-mimpimu yg mungkin sempat terhambat karena kehadiranku. loving you means letting you grow, even if it’s not with me. ini adalah baktiku yg terakhir untuk senyummu. aku sadar, memaksamu menetap hanya akan membuat kita saling melukai. aku nggak mau kamu merasa terpenjara dalam kasih sayangku. jadi, pergilah temukan langit yg lebih luas, yg bisa buat kamu terbang lebih tinggi. namamu nggak akan hilang dari doaku, cuma tujuannya yang berubah. sekarang, aku cuma minta supaya semesta jagain kamu sebaik aku dulu mencoba menjagamu. i’ll love you from a safe distance, tempat dimana kehadiranku nggak membebanimu. aku akan belajar pelan-pelan buat nggak lagi nyari kabarmu. ini caraku menghargai ruang barumu. aku ingin kamu bebas melangkah tanpa harus merasa ditarik balik oleh rasa harapmu kepadaku. terimakasih sudah pernah singgah dan jadi bagian paling indah dihidupku. kita nggak gagal, kita cuma sudah sampai di garis finish yg berbeda. no regrets, only gratitude. aku bersyukur pernah punya kesempatan buat sayang sama kamu. ini adalah pelukan terakhirku lewat doa. aku lepaskan genggamanku supaya tanganmu bisa menggenggam kebahagian yg baru. melangkahlah maju dengan tenang, begitupun juga aku dengan disertai takdir kita masing-masing. goodbye, my most beautiful lesson.”</p>
      <p>sekali lagi aku minta maaf banget ya… semoga kamu selalu dalam lindungan Allah, and i hope you're always happy :)</p>
      <p>-akbar arah k'riedho</p>
      <p class="signature">i loved you, maybe in another life</p>
      <button class="btn" onclick="goStepThree()">lanjut</button>
      <button class="btn" onclick="history.back()">kembali</button>
    `;
  }

  if(page==="step3"){
    content.innerHTML=`
      <h1>pesan untukku.</h1>
      <p>jika kamu ingin menyampaikan sesuatu, tulis di bawah ini.</p>
      <textarea id="pesanInput" rows="4" placeholder="tulis sesuatu di sini..."></textarea>
      <button id="kirimBtn" class="btn" onclick="kirimPesan()">kirim</button>
      <p id="hasilPesan" style="margin-top:10px;font-style:italic;"></p>
      <button class="btn" onclick="history.back()">kembali</button>
    `;
  }
}

/* ===== NAVIGATION ===== */

function goStepOne(){history.pushState({page:"step1"},"","#step1");render("step1");}
function goStepTwo(){history.pushState({page:"step2"},"","#step2");render("step2");}
function goStepThree(){history.pushState({page:"step3"},"","#step3");render("step3");}

window.onpopstate=function(e){
  if(e.state){render(e.state.page);}
  else{render("home");}
};

history.replaceState({page:"home"},"","#home");
render("home");
</script>

</body>
</html>
