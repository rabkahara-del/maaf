<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>untuk kamu vici</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:linear-gradient(#0b0b0b,#151515);
  color:#e6e6e6;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
}
.container{
  width:90%;
  max-width:700px;
  background:rgba(20,20,20,0.8);
  border-radius:18px;
  padding:20px;
  box-shadow:0 0 30px rgba(0,0,0,.6);
  max-height:80vh;
  overflow-y:auto;
}
h1{
  text-align:center;
  margin-bottom:20px;
  font-weight:500;
}
p{
  line-height:1.7;
  margin-bottom:15px;
  font-size:15px;
}
.btn{
  display:block;
  margin:15px auto 0;
  padding:10px 24px;
  border-radius:30px;
  border:1px solid #aaa;
  background:none;
  color:#eee;
  cursor:pointer;
  transition:.3s;
}
.btn:hover{
  background:#eee;
  color:#111;
}
.signature{
  margin-top:20px;
  text-align:right;
  font-style:italic;
  opacity:.8;
}
textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  resize:none;
}
</style>
</head>

<body>

<audio id="bgm" loop></audio>

<div class="container" id="content"></div>

<script>
const content = document.getElementById("content");
const bgm = document.getElementById("bgm");
let currentTrack = "";

function playMusic(src){
  if(currentTrack !== src){
    bgm.pause();
    bgm.src = src;
    bgm.load();
    bgm.volume = 0.4;
    bgm.play().catch(()=>{});
    currentTrack = src;
  }
}

function render(page){

  if(page === "home"){
    content.innerHTML = `
      <h1>hai.</h1>
      <p>aku buat ini hanya untuk menyampaikan sesuatu yang belum sempat aku ucapkan dengan benar.</p>
      <button class="btn" onclick="goStepOne()">klik disini</button>
    `;
  }

  if(page === "step1"){
    playMusic("lagu1.mp3");

    content.innerHTML = `
      <h1>aku minta maaf.</h1>
      <p>aku sadar ada banyak hal yang dulu tidak aku sampaikan dengan cara yang baik.</p>
      <p>aku mungkin menyakitimu tanpa benar-benar memahami dampaknya.</p>
      <p>dan untuk itu, aku benar-benar minta maaf.</p>
      <button class="btn" onclick="goStepTwo()">lanjut</button>
      <button class="btn" onclick="history.back()">kembali</button>
    `;
  }

  if(page === "step2"){
    playMusic("lagu2.mp3");

    content.innerHTML = `
      <h1>penjelasan.</h1>
      <p>kejujuranku waktu itu mungkin terasa seperti luka kedua.</p>
      <p>niatku bukan untuk menghancurkan, tapi caraku salah.</p>
      <p>aku tidak menulis ini untuk meminta kesempatan lagi, hanya untuk menutup semuanya dengan dewasa.</p>
      <button class="btn" onclick="goStepThree()">lanjut</button>
      <button class="btn" onclick="history.back()">kembali</button>
    `;
  }

  if(page === "step3"){
    content.innerHTML = `
      <h1>pesan untukku.</h1>
      <p>jika kamu ingin menyampaikan sesuatu, tulis saja di bawah ini.</p>
      <textarea placeholder="tulis sesuatu di sini..." rows="4"></textarea>
      <button class="btn" onclick="history.back()">kembali</button>
      <p class="signature">- akbar</p>
    `;
  }
}

function goStepOne(){ history.pushState({page:"step1"},"","#step1"); render("step1"); }
function goStepTwo(){ history.pushState({page:"step2"},"","#step2"); render("step2"); }
function goStepThree(){ history.pushState({page:"step3"},"","#step3"); render("step3"); }

window.onpopstate = function(e){
  if(e.state){ render(e.state.page); }
  else { render("home"); }
};

history.replaceState({page:"home"},"","#home");
render("home");
</script>

</body>
</html>
