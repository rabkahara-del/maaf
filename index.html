let currentTrack = "";

/* ===== AUDIO CONTROL ===== */

function playMusic(src){
  if(currentTrack !== src){
    bgm.pause();
    bgm.src = src;
    bgm.load();

    // volume beda tiap lagu
    if(src === "lagu1.mp3"){
      bgm.volume = 0.9; // lagu pertama lebih keras
    } else {
      bgm.volume = 0.6; // lagu kedua normal
    }

    bgm.play().catch(()=>{});
    currentTrack = src;
  }
}

function stopMusic(){
  bgm.pause();
  bgm.currentTime = 0;
  currentTrack = "";
}

  const pesan = document.getElementById("pesanInput").value;

  const btn = document.getElementById("kirimBtn");

  if(pesan.trim()===""){
    hasil.innerHTML="jangan kosong ya.";

  }

  btn.disabled=true;

  emailjs.send("service_88xkoyw","template_i8nr33c",{ message: pesan })
  .then(()=>{
    hasil.innerHTML="pesan berhasil dikirim.";
    btn.innerHTML="terkirim";
  },()=>{
    hasil.innerHTML="gagal mengirim.";
    btn.innerHTML="kirim";
    btn.disabled=false;
  });

kukan ini.</p>
